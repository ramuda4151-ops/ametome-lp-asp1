<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アメトメ</title>
  <script>
    // マスターHTMLを読み込む（URLパスを /lp1/b/ のまま維持）
    (function() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '../index.html', true);
      xhr.onload = function() {
        if (xhr.status === 200) {
          document.open();
          document.write(xhr.responseText);
          document.close();
        }
      };
      xhr.send();
    })();
  </script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;padding:40px;color:#666;">読み込み中...</p>
</body>
</html>
